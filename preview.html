<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="just me" />
<title>just me</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
–bg: #0e0e0e;
–surface: #141414;
–border: #222;
–border2: #2a2a2a;
–text: #e8e4da;
–text2: #ddd8cc;
–muted: #555;
–muted2: #484848;
–accent: #c8f04d;
–red: #e05c5c;
–mono: 'DM Mono', monospace;
–serif: 'DM Serif Display', serif;
}

html, body {
background: var(–bg);
color: var(–text);
font-family: var(–mono);
min-height: 100vh;
min-height: -webkit-fill-available;
overscroll-behavior: none;
}

header {
display: flex;
justify-content: space-between;
align-items: center;
padding: 20px 24px;
padding-top: max(20px, env(safe-area-inset-top) + 12px);
border-bottom: 1px solid #1f1f1f;
position: sticky;
top: 0;ackground: var(–bg);
z-index: 10;
}

.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { font-size: 18px; color: var(–accent); }
.logo-text { font-family: var(–serif); font-size: 20px; letter-spacing: -0.02em; }
.post-count { font-size: 11px; color: var(–muted); letter-spacing: 0.08em; }

main {
max-width: 600px;
margin: 0 auto;
padding: 24px 16px;
padding-bottom: max(32px, env(safe-area-inset-bottom) + 16px);
}

.compose {ackground: var(–surface);
border: 1px solid var(–border);
border-radius: 14px;
padding: 16px;
margin-bottom: 24px;
transition: border-color 0.2s ease;
}
.compose.drag-over { border-color: var(–accent); }

textarea {
width: 100%;ackground: transparent;
border: 1px solid var(–border2);
border-radius: 10px;
color: var(–text);
font-family: var(–mono);
font-size: 15px;
line-height: 1.6;
padding: 12px 14px;
resize: none;
overflow: hidden;
transition: border-color 0.2s ease;
min-height: 80px;
-webkit-appearance: none;
}
textarea::placeholder { color: #555; }
textarea:focus { outline: none; border-color: var(–accent); }

.preview-grid {
display: flex;
gap: 8px;
flex-wrap: wrap;
margin-top: 12px;
}
.preview-wrap { position: relative; }
.preview-img {
width: 72px; height: 72px;
object-fit: cover;
border-radius: 8px;
border: 1px solid var(–border2);
display: block;
}
.preview-remove {
position: absolute; top: -6px; right: -6px;ackground: #1a1a1a; border: 1px solid #333; color: #aaa;
border-radius: 50%; width: 18px; height: 18px; font-size: 9px;
cursor: pointer; display: flex; align-items: center; justify-content: center;
line-height: 1;
}

.compose-footer {
display: flex;
justify-content: space-between;
align-items: center;
margin-top: 12px;
}
.compose-left { display: flex; align-items: center; gap: 10px; }
.compose-right { display: flex; align-items: center; gap: 12px; }

.img-btn {
background: transparent;
border: 1px solid var(–border2);
color: #666;
border-radius: 8px;
padding: 7px 11px;
cursor: pointer;
display: flex;
align-items: center;
gap: 6px;
font-size: 12px;
font-family: var(–mono);
transition: color 0.15s, border-color 0.15s;
-webkit-appearance: none;
}
.img-btn:active { color: var(–accent); border-color: var(–accent); }
.img-count { font-size: 10px; color: #888; }

.drop-hint { font-size: 10px; color: #363636; letter-spacing: 0.04em; }

.char-count { font-size: 12px; color: var(–muted); transition: color 0.2s; }
.char-count.warn { color: var(–red); }

.post-btn {
background: var(–accent);
color: #0e0e0e;
border: none;
border-radius: 8px;
padding: 9px 20px;
font-family: var(–mono);
font-size: 13px;
font-weight: 500;
cursor: pointer;
letter-spacing: 0.04em;
transition: opacity 0.15s, transform 0.15s;
-webkit-appearance: none;
}
.post-btn:disabled { opacity: 0.4; }
.post-btn:active:not(:disabled) { transform: scale(0.97); }

.hint { font-size: 10px; color: #2e2e2e; margin-top: 8px; letter-spacing: 0.06em; }

.feed { display: flex; flex-direction: column; gap: 10px; }

.card {ackground: var(–surface);
border: 1px solid #1e1e1e;
border-radius: 14px;
padding: 18px;
box-shadow: 0 2px 8px rgba(0,0,0,0.2);
transition: transform 0.15s, box-shadow 0.15s;
}

.card-text {
font-size: 15px;
line-height: 1.65;
color: var(–text2);
white-space: pre-wrap;
word-break: break-word;
margin-bottom: 14px;
font-family: var(–mono);
}
.card-text:last-child { margin-bottom: 0; }

.image-grid {
display: grid;
gap: 3px;
border-radius: 10px;
overflow: hidden;
margin-bottom: 14px;
}
.image-grid.n1 { grid-template-columns: 1fr; }
.image-grid.n2 { grid-template-columns: 1fr 1fr; }
.image-grid.n3 { grid-template-columns: 1fr 1fr 1fr; }
.image-grid.n4 { grid-template-columns: 1fr 1fr; }

.grid-img {
width: 100%;
object-fit: cover;
display: block;
cursor: zoom-in;
transition: opacity 0.15s;
}
.image-grid.n1 .grid-img { max-height: 400px; aspect-ratio: unset; object-fit: contain; background: #111; }
.image-grid.n2 .grid-img,
.image-grid.n3 .grid-img,
.image-grid.n4 .grid-img { aspect-ratio: 1; max-height: 180px; }
.grid-img:active { opacity: 0.8; }

.card-footer {
display: flex;
justify-content: space-between;
align-items: center;
}
.card-date { font-size: 11px; color: var(–muted2); letter-spacing: 0.04em; }

.delete-btn {
background: transparent;
border: none;
color: #484848;
cursor: pointer;
font-size: 13px;
padding: 4px 8px;
border-radius: 6px;
font-family: var(–mono);
-webkit-appearance: none;
}

.confirm-row { display: flex; align-items: center; gap: 8px; }
.confirm-label { font-size: 11px; color: #666; }
.confirm-yes, .confirm-no {
border-radius: 6px;
padding: 4px 12px;
font-size: 11px;
cursor: pointer;
font-family: var(–mono);
-webkit-appearance: none;
}
.confirm-yes { background: #3a1a1a; border: 1px solid #6b2020; color: var(–red); }
.confirm-no { background: transparent; border: 1px solid var(–border2); color: #888; }

.empty {
text-align: center;
padding: 60px 20px;
color: #444;
display: flex;
flex-direction: column;
align-items: center;
gap: 14px;
}
.empty-icon { font-size: 28px; color: #2a2a2a; }
.empty-text { font-size: 13px; letter-spacing: 0.06em; }

/* Lightbox */
#lightbox {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.94);
z-index: 100;
align-items: center;
justify-content: center;
padding: 20px;
}
#lightbox.open { display: flex; }
#lightbox img {
max-width: 100%;
max-height: 90vh;
object-fit: contain;
border-radius: 8px;
}
#lightbox-close {
position: fixed;
top: max(16px, env(safe-area-inset-top) + 8px);
right: 20px;ackground: transparent;
border: 1px solid #333;
color: #999;
border-radius: 8px;
padding: 7px 14px;
font-size: 13px;
cursor: pointer;
font-family: var(–mono);
-webkit-appearance: none;
}
</style>

</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">◈</span>
    <span class="logo-text">just me</span>
  </div>
  <span class="post-count" id="post-count">0 posts</span>
</header>

<main>
  <div class="compose" id="compose">
    <textarea id="draft" placeholder="what's on your mind?" maxlength="280" rows="3"></textarea>
    <div class="preview-grid" id="preview-grid" style="display:none"></div>
    <div class="compose-footer">
      <div class="compose-left">
        <button class="img-btn" id="img-btn" onclick="document.getElementById('file-input').click()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span id="img-count"></span>
        </button>
        <span class="drop-hint">or drop images here</span>
      </div>
      <div class="compose-right">
        <span class="char-count" id="char-count">280</span>
        <button class="post-btn" id="post-btn" disabled onclick="submitPost()">post it</button>
      </div>
    </div>
    <div class="hint">⌘↵ to post</div>
    <input type="file" id="file-input" accept="image/*" multiple style="display:none" />
  </div>

  <div class="feed" id="feed">
    <div class="empty">
      <span class="empty-icon">◈</span>
      <p class="empty-text">Nothing yet. Post something.</p>
    </div>
  </div>
</main>

<div id="lightbox">
  <img id="lightbox-img" src="" alt="" />
  <button id="lightbox-close" onclick="closeLightbox()">✕ close</button>
</div>

<script>
const STORAGE_KEY = 'justme-posts-v1';
let posts = [];
let draftImages = []; // [{dataUrl}]
let pendingDelete = null;

// --- Storage ---
function loadPosts() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    posts = raw ? JSON.parse(raw) : [];
  } catch(_) { posts = []; }
}
function savePosts() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(posts)); } catch(e) {
    alert('Storage full — try deleting some old posts with images.');
  }
}

// --- Init ---
loadPosts();
renderFeed();
updatePostCount();

// --- Textarea ---
const draftEl = document.getElementById('draft');
const charCountEl = document.getElementById('char-count');
const postBtnEl = document.getElementById('post-btn');

draftEl.addEventListener('input', () => {
  draftEl.style.height = 'auto';
  draftEl.style.height = draftEl.scrollHeight + 'px';
  const left = 280 - draftEl.value.length;
  charCountEl.textContent = left;
  charCountEl.classList.toggle('warn', left < 20);
  updatePostBtn();
});

draftEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) submitPost();
});

function updatePostBtn() {
  const canPost = draftEl.value.trim() || draftImages.length > 0;
  postBtnEl.disabled = !canPost;
}

// --- Images ---
const fileInput = document.getElementById('file-input');
const previewGrid = document.getElementById('preview-grid');
const imgBtn = document.getElementById('img-btn');
const imgCountEl = document.getElementById('img-count');

fileInput.addEventListener('change', () => {
  handleFiles(fileInput.files);
  fileInput.value = '';
});

function handleFiles(files) {
  const valid = Array.from(files).filter(f => f.type.startsWith('image/')).slice(0, 4 - draftImages.length);
  if (!valid.length) return;
  let loaded = 0;
  valid.forEach(file => {
    const r = new FileReader();
    r.onload = () => {
      draftImages.push({ dataUrl: r.result });
      loaded++;
      if (loaded === valid.length) renderPreviews();
    };
    r.readAsDataURL(file);
  });
}

function renderPreviews() {
  previewGrid.innerHTML = '';
  if (draftImages.length === 0) { previewGrid.style.display = 'none'; return; }
  previewGrid.style.display = 'flex';
  draftImages.forEach((img, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'preview-wrap';
    const el = document.createElement('img');
    el.className = 'preview-img';
    el.src = img.dataUrl;
    const rm = document.createElement('button');
    rm.className = 'preview-remove';
    rm.textContent = '✕';
    rm.onclick = () => { draftImages.splice(i, 1); renderPreviews(); updatePostBtn(); updateImgBtn(); };
    wrap.appendChild(el);
    wrap.appendChild(rm);
    previewGrid.appendChild(wrap);
  });
  updateImgBtn();
  updatePostBtn();
}

function updateImgBtn() {
  imgBtn.disabled = draftImages.length >= 4;
  imgCountEl.textContent = draftImages.length > 0 ? `${draftImages.length}/4` : '';
}

// Drag and drop
const compose = document.getElementById('compose');
compose.addEventListener('dragover', e => { e.preventDefault(); compose.classList.add('drag-over'); });
compose.addEventListener('dragleave', () => compose.classList.remove('drag-over'));
compose.addEventListener('drop', e => {
  e.preventDefault();
  compose.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});

// --- Post ---
function submitPost() {
  const text = draftEl.value.trim();
  if (!text && draftImages.length === 0) return;
  const entry = {
    id: Date.now(),
    text,
    images: draftImages.map(i => i.dataUrl),
    createdAt: new Date().toISOString(),
  };
  posts.unshift(entry);
  savePosts();
  draftEl.value = '';
  draftEl.style.height = 'auto';
  charCountEl.textContent = '280';
  charCountEl.classList.remove('warn');
  draftImages = [];
  renderPreviews();
  updatePostBtn();
  updateImgBtn();
  renderFeed();
  updatePostCount();
}

// --- Render Feed ---
function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
    ' · ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function renderFeed() {
  const feed = document.getElementById('feed');
  if (posts.length === 0) {
    feed.innerHTML = `<div class="empty"><span class="empty-icon">◈</span><p class="empty-text">Nothing yet. Post something.</p></div>`;
    return;
  }
  feed.innerHTML = '';
  posts.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = p.id;

    if (p.text) {
      const txt = document.createElement('p');
      txt.className = 'card-text';
      txt.textContent = p.text;
      card.appendChild(txt);
    }

    if (p.images && p.images.length > 0) {
      const grid = document.createElement('div');
      grid.className = `image-grid n${p.images.length}`;
      p.images.forEach(src => {
        const img = document.createElement('img');
        img.className = 'grid-img';
        img.src = src;
        img.alt = '';
        img.onclick = () => openLightbox(src);
        grid.appendChild(img);
      });
      card.appendChild(grid);
    }

    const footer = document.createElement('div');
    footer.className = 'card-footer';

    const date = document.createElement('span');
    date.className = 'card-date';
    date.textContent = formatDate(p.createdAt);

    const actions = document.createElement('div');
    actions.id = `actions-${p.id}`;
    renderDeleteBtn(actions, p.id);

    footer.appendChild(date);
    footer.appendChild(actions);
    card.appendChild(footer);
    feed.appendChild(card);
  });
}

function renderDeleteBtn(container, id) {
  container.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'delete-btn';
  btn.textContent = '✕';
  btn.onclick = () => renderConfirm(container, id);
  container.appendChild(btn);
}

function renderConfirm(container, id) {
  container.innerHTML = '';
  const row = document.createElement('div');
  row.className = 'confirm-row';
  const label = document.createElement('span');
  label.className = 'confirm-label';
  label.textContent = 'delete?';
  const yes = document.createElement('button');
  yes.className = 'confirm-yes';
  yes.textContent = 'yes';
  yes.onclick = () => deletePost(id);
  const no = document.createElement('button');
  no.className = 'confirm-no';
  no.textContent = 'no';
  no.onclick = () => renderDeleteBtn(container, id);
  row.appendChild(label);
  row.appendChild(yes);
  row.appendChild(no);
  container.appendChild(row);
}

function deletePost(id) {
  posts = posts.filter(p => p.id !== id);
  savePosts();
  renderFeed();
  updatePostCount();
}

function updatePostCount() {
  const el = document.getElementById('post-count');
  el.textContent = `${posts.length} ${posts.length === 1 ? 'post' : 'posts'}`;
}

// --- Lightbox ---
function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
</script>

</body>
</html>
