<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="just me" />
<title>just me</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0e0e0e;
    color: #e8e4da;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    border-bottom: 1px solid #1f1f1f;
    position: sticky;
    top: 0;
    background: #0e0e0e;
  }
  main {
    max-width: 600px;
    margin: 0 auto;
    padding: 24px 16px;
  }
  textarea {
    width: 100%;
    background: #141414;
    border: 1px solid #222;
    color: #e8e4da;
    padding: 12px;
    font-size: 15px;
    border-radius: 8px;
    min-height: 80px;
  }
  button {
    background: #c8f04d;
    color: #0e0e0e;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
  }
  .post { background: #141414; padding: 15px; margin: 10px 0; border-radius: 8px; }
</style>
</head>
<body>

<header>
  <div><span>◈ just me</span></div>
  <span id="post-count">0 posts</span>
</header>

<main>
  <textarea id="draft" placeholder="what's on your mind?"></textarea>
  <button onclick="submitPost()">post it</button>
  <div id="feed"></div>
</main>

<script>
const STORAGE_KEY = 'justme-posts';
let posts = [];

function loadPosts() {
  try {
    posts = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch(_) { posts = []; }
  renderFeed();
}

function submitPost() {
  const text = document.getElementById('draft').value.trim();
  if (!text) return;
  posts.unshift({
    id: Date.now(),
    text: text,
    createdAt: new Date().toISOString()
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
  document.getElementById('draft').value = '';
  renderFeed();
}

function renderFeed() {
  const feed = document.getElementById('feed');
  const count = document.getElementById('post-count');
  count.textContent = posts.length + ' posts';
  
  if (posts.length === 0) {
    feed.innerHTML = '<p style="text-align:center;color:#555;margin-top:40px;">Nothing yet. Post something.</p>';
    return;
  }
  
  feed.innerHTML = posts.map(p => `
    <div class="post">
      <p>${p.text}</p>
      <small style="color:#666;">${new Date(p.createdAt).toLocaleDateString()}</small>
    </div>
  `).join('');
}

loadPosts();
</script>

</body>
</html>
